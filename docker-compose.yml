version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: ent_admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: ent_clinical_db
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://ent_admin:secure_password_123@db/ent_clinical_db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
